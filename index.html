/* ══════════════════════════════════════════════
DRAG AND DROP STYLES
══════════════════════════════════════════════ */
.draggable-section {
cursor: default;
transition: all 0.2s ease;
position: relative;
margin-bottom: 0;
}
.draggable-section::before {
content: '⋮⋮';
position: absolute;
top: 8px;
right: 12px;
color: white;
font-size: 1.3rem;
font-weight: bold;
opacity: 0;
transition: opacity 0.2s;
pointer-events: all;
cursor: grab;
z-index: 100;
background: rgba(99,102,241,0.7);
padding: 6px 10px;
border-radius: 8px;
box-shadow: 0 2px 8px rgba(0,0,0,0.3);
line-height: 1;
}
.draggable-section:hover::before {
opacity: 1;
}
.draggable-section::before:active {
cursor: grabbing;
}
.draggable-section.dragging {
opacity: 0.4;
cursor: grabbing;
transform: scale(0.98);
}
.draggable-section.drag-over {
outline: 2px solid var(--accent);
outline-offset: 4px;
background: rgba(99,102,241,0.05);
border-radius: 15px;
}
/* Ensure wrapped sections maintain proper spacing */
.draggable-section > * {
margin-bottom: 1.3rem;
}
.draggable-section:last-child > * {
margin-bottom: 0;
}
/* Light mode adjustments */
body.light-mode .draggable-section::before {
color: white;
background: rgba(99,102,241,0.8);
}
body.light-mode .draggable-section.drag-over {
background: rgba(99,102,241,0.08);
outline-color: var(--accent);
}
/* ══════════════════════════════════════════════
GLOBAL SEARCH

// ── GOOGLE DRIVE: Status Display ───────────────────────────────────────────
function setDriveStatus(state, label) {
  const dot = document.getElementById('gdrive-dot');

  if (!dot || !labelEl) return;
  
  dot.className = 'gdrive-dot';
  
  if (state === 'connected') {

// ── GOOGLE DRIVE: Connect ──────────────────────────────────────────────────
function connectGoogleDrive() {
  console.log('Initiating Google Drive connection...');
  
  if (!window.google?.accounts?.oauth2) {
    console.error('Google Identity Services library not loaded');
    setDriveStatus('error', 'Library not loaded');
    alert('⚠️ Google Drive integration is not ready. Please refresh the page and try again.');

async function saveToGoogleDrive() {
  if (!gdriveAccessToken) {
    console.log('No Google Drive access token available');
    return;
  }

  const payload = { db, portDb, creditDb, budgets };
  const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
  const metadata = {

    parents: [GDRIVE_CONFIG.FOLDER_ID]

        const form = new FormData();

          body: form

      } else {
        // Create new file

        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));

        const createResp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {

          headers: { 'Authorization': 'Bearer ' + gdriveAccessToken },

        gdriveFileIds.main = data.id;
        console.log('New file created successfully');
      }
      
      setDriveStatus('connected', 'Drive synced ✓');
    }
    
  } catch (error) {
    console.error('Google Drive save error:', error);
    setDriveStatus('error', 'Sync failed');
  }
}

// ── GOOGLE DRIVE: Load Data ────────────────────────────────────────────────
async function loadFromGoogleDrive() {
  if (!gdriveAccessToken) {
    console.warn('No Google Drive access token available');
    setDriveStatus('error', 'Not authenticated');
    return;
  }

  try {
    console.log('Loading data from Google Drive...');
    
    const searchUrl = `https://www.googleapis.com/drive/v3/files?q=name='financeos_data.json'+and+'${GDRIVE_CONFIG.FOLDER_ID}'+in+parents&fields=files(id)`;
    const searchResp = await fetch(searchUrl, {
      headers: { 'Authorization': 'Bearer ' + gdriveAccessToken }
    });
    
    if (!searchResp.ok) {
      console.error('Google Drive search failed:', searchResp.status);
      
      if (searchResp.status === 401) {
        // Token expired
        localStorage.removeItem(STORAGE_KEYS.GDRIVE_CONNECTED);
        gdriveConnected = false;
        gdriveAccessToken = null;
        setDriveStatus('error', 'Session expired');
        
        const btn = document.getElementById('gdrive-btn');
        if (btn) btn.innerHTML = '<i class="fab fa-google-drive"></i> Reconnect';
        return;
      }
      
      throw new Error(`Search failed: ${searchResp.status}`);
    }
    
    const searchData = await searchResp.json();
    console.log('Search result:', searchData);
    
    if (!searchData.files || searchData.files.length === 0) {
      console.log('No existing file found - creating new one');
      setDriveStatus('connected', 'Drive ready (new)');
      saveToGoogleDrive(); // Create initial file
      return;
    }
    
    gdriveFileIds.main = searchData.files[0].id;
    console.log('Loading file:', gdriveFileIds.main);
    
    const fileResp = await fetch(`https://www.googleapis.com/drive/v3/files/${gdriveFileIds.main}?alt=media`, {
      headers: { 'Authorization': 'Bearer ' + gdriveAccessToken }
    });
    
    if (!fileResp.ok) {
      console.error('File fetch failed:', fileResp.status);
      throw new Error(`File fetch failed: ${fileResp.status}`);
    }
    
    const payload = await fileResp.json();
    console.log('Data loaded from Google Drive successfully');
    
    // Update local data
    if (payload.db) { 
      db = payload.db; 
      localStorage.setItem('fos_db_v3', JSON.stringify(db)); 
    }
    if (payload.portDb) { 
      portDb = payload.portDb.map(normalizePortRecord); 
      localStorage.setItem('fos_port_v3', JSON.stringify(portDb)); 
    }
    if (payload.creditDb) { 
      creditDb = payload.creditDb; 
      localStorage.setItem('fos_credit_v1', JSON.stringify(creditDb)); 
    }
    if (payload.budgets) { 
      budgets = payload.budgets; 
      localStorage.setItem('fos_budgets', JSON.stringify(budgets)); 
    }
    
    setDriveStatus('connected', 'Drive loaded ✓');
    buildFilterDropdowns(); 
    buildPortDropdowns(); 
    renderDashboard();
    
  } catch (error) {
    console.error('Google Drive load error:', error);
    setDriveStatus('error', 'Load failed');
    
    // Clear connection state on repeated failures
    localStorage.removeItem(STORAGE_KEYS.GDRIVE_CONNECTED);
    gdriveConnected = false;
    gdriveAccessToken = null;
    
    const btn = document.getElementById('gdrive-btn');
    if (btn) btn.innerHTML = '<i class="fab fa-google-drive"></i> Reconnect';
  }
}
